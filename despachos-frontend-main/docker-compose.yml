version: "3.8"

services:

  # ─── Frontend React + Vite (servido con Nginx) ────────
  frontend:
    build:
      context: .
      args:
        # Si el backend corre en el mismo host (docker-compose del backend
        # levantado aparte), localhost:8080/8081 funciona porque los puertos
        # están publicados. En AWS, acá va la URL/IP pública de cada backend.
        VITE_API_VENTAS_URL: ${VITE_API_VENTAS_URL:-http://localhost:8080/api/v1/ventas}
        VITE_API_DESPACHOS_URL: ${VITE_API_DESPACHOS_URL:-http://localhost:8081/api/v1/despachos}
    container_name: despacho-frontend
    ports:
      - "80:80"
    restart: unless-stopped
